name: Update GitHub Stats Cards

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Generate GitHub stats card
      # Uses lowlighter/metrics which runs with the PAT directly in GitHub Actions,
      # so it reads from the full GitHub contribution graph (including org repos).
      # Requires a PAT named METRICS_TOKEN with scopes: repo, read:user
      - name: Generate stats card
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Klastic
          base: activity, community, repositories, metadata
          base_indepth: yes
          repositories_affiliations: owner, collaborator, organization_member
          filename: github-stats.svg

      # Generate top languages card (includes all repos and orgs via PAT)
      - name: Generate top languages card
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Klastic
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          repositories_affiliations: owner, collaborator, organization_member
          filename: github-languages.svg
