name: Update GitHub Stats Cards

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Generate GitHub stats card (includes private and org contributions via PAT)
      # Requires a PAT named METRICS_TOKEN with scopes: repo, read:user, read:org
      # read:org is required for include_all_commits=true to count commits in
      # organization repositories (e.g. LostKode, Industrial-Parasite).
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Klastic&show_icons=true&theme=dark&hide_border=true&count_private=true&include_all_commits=true
          path: github-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      # Generate top languages card (includes private and org repos via PAT)
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Klastic&layout=compact&theme=dark&hide_border=true&count_private=true
          path: github-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add github-stats.svg github-languages.svg
          git commit -m "chore: update GitHub stats cards" || exit 0
          git pull --rebase
          git push
