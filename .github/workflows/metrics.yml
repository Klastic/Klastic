name: GitHub Metrics

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Generate overall GitHub stats (includes private contributions)
      # Requires a PAT named METRICS_TOKEN with scopes: read:user, repo
      - name: Generate GitHub stats
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Klastic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_affiliations: owner, collaborator, organization_member
          config_timezone: UTC
          filename: github-stats.svg

      # Generate top languages (includes private repos)
      - name: Generate top languages
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Klastic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          repositories_affiliations: owner, collaborator, organization_member
          config_timezone: UTC
          filename: github-languages.svg
